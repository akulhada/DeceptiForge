# Purpose: continuous integration for the DeceptiForge monorepo.
# Responsibilities: run backend quality gates (ruff, mypy, pytest) with a Redis service for
#   integration tests, validate migrations, run frontend lint/typecheck/tests, build the API image
#   and assert it runs as non-root, and scan for secrets. Versions are pinned for reproducibility.
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '22.13.0'
  PNPM_VERSION: '9.15.4'

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s
          --health-timeout 3s --health-retries 10
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install
        run: pip install -e '.[dev]'
      - name: Ruff
        run: ruff check app tests
      - name: MyPy
        run: mypy app
      - name: Pytest (unit + fakeredis integration)
        run: pytest
      - name: Pytest (real Redis integration)
        env:
          REDIS_TEST_URL: redis://localhost:6379/0
        run: pytest -k redis_integration
      - name: Validate migrations
        env:
          DATABASE_URL: postgresql+psycopg://unused:unused@localhost/unused
        run: alembic upgrade head --sql > /dev/null

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm typecheck
      - name: Test
        run: pnpm test

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -t deceptiforge-api ./apps/api
      - name: Assert container runs as non-root
        run: |
          uid="$(docker run --rm deceptiforge-api id -u)"
          echo "container uid=$uid"
          test "$uid" != "0"

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
