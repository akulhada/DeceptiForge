# Purpose: continuous integration for the DeceptiForge monorepo.
# Responsibilities: run backend quality gates; validate migrations up/down and alert concurrency
#   against live PostgreSQL; validate Redis-backed distributed controls; run frontend gates; certify
#   production settings and the production Compose topology; build the API image and assert UID
#   10001, no migration-on-start, health, readiness, and demo-unavailable; and scan for secrets with
#   a checksum-verified Gitleaks. Actions run on the current (Node 24) runtime; runtimes are pinned.
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '24'
  # pnpm version is the single source of truth in package.json (packageManager); do not duplicate.
  GITLEAKS_VERSION: '8.21.2'

jobs:
  backend-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install
        run: pip install -e '.[dev]'
      - name: Diagnostics (safe)
        run: |
          echo "python: $(python --version)"
          echo "pip: $(pip --version)"
          echo "ruff: $(ruff --version)"
          echo "mypy: $(mypy --version)"
      - name: Ruff
        run: ruff check app tests
      - name: MyPy
        run: mypy app
      - name: Pytest (unit + fakeredis integration)
        run: pytest -vv --maxfail=1
      # AI tripwire RAG/MCP coverage runs against deterministic in-memory fake adapters — no paid
      # vector store or MCP server is contacted in CI.
      - name: Pytest (AI tripwire mock RAG/MCP adapters)
        run: pytest -vv tests/test_ai_tripwire_flow.py tests/test_ai_tripwire_api.py
      # Agent activity sensor: adapter/SDK contract, path-normalization safety, deterministic scope
      # rules, and signed event ingestion — no third-party agent service is contacted in CI.
      - name: Pytest (agent sensor rules, adapter/CLI, signed ingest)
        run: >-
          pytest -vv tests/test_agent_sensor_services.py tests/test_agent_sensor_api.py
          tests/test_agent_sdk.py tests/test_agent_retention.py
      # Measured coverage engine: deterministic scoring, cross-surface calculation, scheduled job,
      # and a large-inventory performance regression guard (bounded, no O(n^2)).
      - name: Pytest (coverage engine + cross-surface + perf regression)
        run: >-
          pytest -vv tests/test_coverage_scoring.py tests/test_coverage_engine.py
          tests/test_coverage_api.py tests/test_coverage_perf.py
      - name: Pytest (capacity policy regression)
        run: pytest -vv tests/test_capacity.py tests/test_capacity_api.py tests/performance/test_capacity_model.py
      # SIEM/SOAR export: SSRF security tests, adapter contract, outbox/delivery concurrency, and
      # mock-transport delivery — no real SIEM tenant is contacted in CI.
      - name: Pytest (SIEM export SSRF + adapters + outbox/delivery concurrency)
        run: >-
          pytest -vv tests/test_integrations_core.py tests/test_integrations_delivery.py
          tests/test_integrations_api.py tests/test_integrations_retention.py
      # Reliability / disaster recovery: region fencing, restore verification, failover control
      # plane, and readiness — deterministic, no real cloud infrastructure contacted.
      - name: Pytest (reliability fencing + restore verify + failover)
        run: >-
          pytest -vv tests/test_reliability_domain.py tests/test_reliability_fencing.py
          tests/test_reliability_restore.py tests/test_reliability_api.py

  postgres-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: deceptiforge_ci
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci-test-only
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U ci -d deceptiforge_ci" --health-interval 5s
          --health-timeout 3s --health-retries 15
    defaults:
      run:
        working-directory: apps/api
    env:
      DATABASE_URL: postgresql+psycopg://ci:ci-test-only@localhost:5432/deceptiforge_ci
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install
        run: pip install -e '.[dev]'
      - name: Diagnostics (safe)
        run: |
          echo "alembic: $(alembic --version)"
          echo "postgres reachable: $(pg_isready -h localhost -p 5432 >/dev/null 2>&1 && echo yes || echo no)"
      - name: Migrations — apply to live PostgreSQL
        run: alembic upgrade head
      - name: Migrations — current revision
        run: alembic current
      - name: Migrations — downgrade one and re-apply (rollback check)
        run: |
          alembic downgrade -1
          alembic upgrade head
      - name: Migrations — assert tables and alert-episode constraint exist
        env:
          PGPASSWORD: ci-test-only
        run: |
          for t in api_keys monitor_credentials security_audit reconstruction_jobs incidents alerts; do
            psql -h localhost -U ci -d deceptiforge_ci -tAc \
              "SELECT to_regclass('public.$t')" | grep -qx "$t" || { echo "missing table: $t"; exit 1; }
          done
          psql -h localhost -U ci -d deceptiforge_ci -tAc \
            "SELECT conname FROM pg_constraint WHERE conname='uq_alert_episode'" \
            | grep -qx uq_alert_episode || { echo "missing constraint: uq_alert_episode"; exit 1; }
      - name: Concurrent duplicate-ingestion tests (live PostgreSQL)
        env:
          POSTGRES_TEST_URL: postgresql+psycopg://ci:ci-test-only@localhost:5432/deceptiforge_ci
        run: pytest -vv tests/test_alert_concurrency.py
      - name: Database honey connector integration (live PostgreSQL, synthetic schema)
        env:
          POSTGRES_TEST_URL: postgresql+psycopg://ci:ci-test-only@localhost:5432/deceptiforge_ci
        run: pytest -vv tests/test_database_honey_integration.py

  redis-integration:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s
          --health-timeout 3s --health-retries 10
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install
        run: pip install -e '.[dev]'
      - name: Distributed replay + rate-limit integration (real Redis)
        env:
          REDIS_TEST_URL: redis://localhost:6379/0
        run: pytest -vv -k redis_integration

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      # Enable Corepack BEFORE setup-node so its built-in pnpm cache finds the pnpm shim. pnpm
      # version comes from packageManager in package.json (single source of truth). This avoids a
      # separate actions/cache@v4 step, which still declares the deprecated Node 20 runtime.
      - name: Enable Corepack
        run: corepack enable
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm typecheck
      - name: Lint
        run: pnpm lint
      - name: Test
        run: pnpm test
      - name: Build (web dashboard + extension)
        run: pnpm build
      # Extension hardening: the built MV3 bundle must request only minimal permissions, ship a
      # locked-down CSP, and contain no eval, no remote code, and no embedded secrets.
      - name: Extension manifest + permission audit
        run: |
          set -euo pipefail
          MF=apps/extension/build/chrome-mv3-prod/manifest.json
          test -f "$MF" || { echo "missing built manifest"; exit 1; }
          for forbidden in '<all_urls>' 'clipboardRead' 'webRequest' '"history"' '"tabs"' '"cookies"' '"<all_urls>"'; do
            if grep -q "$forbidden" "$MF"; then echo "forbidden permission: $forbidden"; exit 1; fi
          done
          grep -q '"storage"' "$MF" || { echo "expected minimal storage permission"; exit 1; }
          echo "manifest permission audit passed"
      - name: Extension no-eval / no-remote-code / secret scan
        run: |
          set -euo pipefail
          DIR=apps/extension/build/chrome-mv3-prod
          if grep -rEn 'eval\(|new Function\(' "$DIR"/*.js "$DIR"/**/*.js 2>/dev/null; then
            echo "eval / new Function found in extension build"; exit 1; fi
          if grep -rEn "https?://[^\"' )]+\.js" "$DIR"/*.js "$DIR"/**/*.js 2>/dev/null; then
            echo "remote script URL found in extension build"; exit 1; fi
          if grep -rEn 'dfk_[A-Za-z0-9]{8}|signing_secret"?\s*[:=]\s*"[A-Za-z0-9_-]{16}|BEGIN (RSA|EC|PRIVATE) KEY' "$DIR" 2>/dev/null; then
            echo "possible secret embedded in extension build"; exit 1; fi
          echo "no eval / remote code / secrets in extension build"

  production-config:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install
        run: pip install -e '.[dev]'
      - name: Production settings smoke test
        run: pytest -vv tests/test_production_settings_smoke.py
      - name: Production Compose renders
        working-directory: .
        env:
          POSTGRES_DB: deceptiforge
          POSTGRES_USER: deceptiforge
          POSTGRES_PASSWORD: ci-test-only
          EVIDENCE_ENCRYPTION_KEY: ci-test-only
        run: docker compose -f docker-compose.prod.example.yml config > /dev/null
        # Exact topology values (signatures on, demo off, private ports, worker services) are
        # asserted against the file in tests/test_production_settings_smoke.py above.

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - name: Build API image
        run: docker build -t deceptiforge-api ./apps/api
      - name: Assert container runs as UID 10001 (non-root)
        run: |
          uid="$(docker run --rm deceptiforge-api id -u)"
          echo "container uid=$uid"
          test "$uid" = "10001"
      - name: Assert default command does not run migrations
        run: |
          cmd="$(docker inspect --format '{{json .Config.Cmd}}' deceptiforge-api)"
          echo "cmd=$cmd"
          echo "$cmd" | grep -q uvicorn
          echo "$cmd" | grep -qiv alembic
      - name: Runtime-only import smoke (no dev dependencies)
        # The image installs only runtime deps. Importing the full router graph here catches a
        # runtime dependency (e.g. httpx) that was only declared under [dev] — before the app
        # crashes on boot with no listener.
        # APP_ENV=development so create_app() skips prod runtime validation (redis/rate-limit/etc);
        # this step verifies the import graph resolves, not the production config surface.
        run: |
          docker run --rm -e APP_ENV=development \
            -e DATABASE_URL='postgresql+psycopg://u:p@localhost/db' \
            deceptiforge-api python -c 'import app.main; print("import ok")'
      - name: Start container (development, no external deps required for probes)
        run: |
          set -euo pipefail
          docker run -d --name df-api \
            -e APP_ENV=development \
            -e DATABASE_URL='postgresql+psycopg://u:p@localhost/db' \
            -p 8000:8000 deceptiforge-api
          healthy=false
          for i in $(seq 1 30); do
            # Fail fast if the container exited (e.g. an import error) instead of waiting the full 30s.
            if [ "$(docker inspect -f '{{.State.Running}}' df-api)" != "true" ]; then
              echo "container is not running (exited during startup):"
              docker logs df-api || true
              exit 1
            fi
            if curl -fsS http://localhost:8000/health >/dev/null; then healthy=true; break; fi
            sleep 1
          done
          if [ "$healthy" != "true" ]; then
            echo "container never became healthy; last logs:"
            docker logs df-api || true
            exit 1
          fi
      - name: Health endpoint responds
        run: curl -fsS http://localhost:8000/health
      - name: Readiness endpoint responds safely (no secrets)
        run: |
          body="$(curl -s http://localhost:8000/ready)"
          echo "$body"
          # Reports dependency + enforcement state (monitor_signatures_enforced is a safe boolean).
          echo "$body" | grep -q '"database"'
          echo "$body" | grep -q 'monitor_signatures_enforced'
          # Must not leak secret material.
          echo "$body" | grep -Eqi 'password|signing_secret|api[_-]?key' && \
            { echo "readiness leaked secret material"; exit 1; } || true
      - name: Demo routes unavailable in this image config
        run: |
          code="$(curl -s -o /dev/null -w '%{http_code}' -X POST http://localhost:8000/demo/seed)"
          echo "demo seed status=$code"
          test "$code" = "404"
      - name: Stop container
        if: always()
        run: docker rm -f df-api || true

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0
      - name: Gitleaks (pinned version, verified against published checksums, redacted)
        run: |
          tar="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          base="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"
          curl -sSfL "$base/$tar" -o "$tar"
          curl -sSfL "$base/gitleaks_${GITLEAKS_VERSION}_checksums.txt" -o checksums.txt
          # Verify the exact pinned artifact against the release's published checksum.
          grep " $tar\$" checksums.txt | sha256sum -c -
          tar -xzf "$tar" gitleaks
          ./gitleaks detect --source . --config .gitleaks.toml --redact --no-banner --exit-code 1

  reliability-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - name: Reliability scripts syntax + safety
        run: |
          set -euo pipefail
          # 1. Every reliability script must parse.
          for f in scripts/reliability/*.sh; do bash -n "$f"; done
          # 2. Scripts must be env-guarded (strict mode) and must not echo secret-looking literals.
          for f in scripts/reliability/*.sh; do
            grep -q 'set -euo pipefail' "$f" || { echo "$f missing strict mode"; exit 1; }
          done
          if grep -rnE '(SECRET|TOKEN|PASSWORD|API_KEY)[A-Z_]*=[A-Za-z0-9/+_-]{12,}' scripts/reliability/; then
            echo "reliability script contains an embedded secret-looking literal"; exit 1; fi
          # 3. Runbook links referenced by SecurityIntegrations/DisasterRecovery must exist.
          for doc in ReliabilityArchitecture BackupPolicy PostgreSQLRecovery DisasterRecovery \
                     RegionalFailover RegionalFailback RestoreDrills DegradedModes EncryptionKeyRecovery; do
            test -f "docs/$doc.md" || { echo "missing docs/$doc.md"; exit 1; }
          done
          for rb in RegionalOutage DatabaseCorruption RedisFailure ObjectStorageFailure; do
            test -f "docs/runbooks/$rb.md" || { echo "missing docs/runbooks/$rb.md"; exit 1; }
          done
          echo "reliability scripts + docs check passed"
