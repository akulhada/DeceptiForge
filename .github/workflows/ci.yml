# Purpose: continuous integration for the DeceptiForge monorepo.
# Responsibilities: run backend quality gates; validate migrations up/down and alert concurrency
#   against live PostgreSQL; validate Redis-backed distributed controls; run frontend gates; certify
#   production settings and the production Compose topology; build the API image and assert UID
#   10001, no migration-on-start, health, readiness, and demo-unavailable; and scan for secrets with
#   a checksum-verified Gitleaks. Actions run on the current (Node 24) runtime; runtimes are pinned.
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '24'
  # pnpm version is the single source of truth in package.json (packageManager); do not duplicate.
  GITLEAKS_VERSION: '8.21.2'

jobs:
  backend-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install
        run: |
          pip install --require-hashes -r requirements-dev.lock.txt
          pip install --no-deps -e .
      - name: Diagnostics (safe)
        run: |
          echo "python: $(python --version)"
          echo "pip: $(pip --version)"
          echo "ruff: $(ruff --version)"
          echo "mypy: $(mypy --version)"
      - name: Ruff
        # scripts/ ships in the image and provisions credentials; it is held to the same bar.
        run: ruff check app tests scripts
      - name: MyPy
        run: mypy app
      - name: Pytest (unit + fakeredis integration)
        run: pytest -vv --maxfail=1
      # AI tripwire RAG/MCP coverage runs against deterministic in-memory fake adapters — no paid
      # vector store or MCP server is contacted in CI.
      - name: Pytest (AI tripwire mock RAG/MCP adapters)
        run: pytest -vv tests/test_ai_tripwire_flow.py tests/test_ai_tripwire_api.py
      # Agent activity sensor: adapter/SDK contract, path-normalization safety, deterministic scope
      # rules, and signed event ingestion — no third-party agent service is contacted in CI.
      - name: Pytest (agent sensor rules, adapter/CLI, signed ingest)
        run: >-
          pytest -vv tests/test_agent_sensor_services.py tests/test_agent_sensor_api.py
          tests/test_agent_sdk.py tests/test_agent_retention.py
      # Measured coverage engine: deterministic scoring, cross-surface calculation, scheduled job,
      # and a large-inventory performance regression guard (bounded, no O(n^2)).
      - name: Pytest (coverage engine + cross-surface + perf regression)
        run: >-
          pytest -vv tests/test_coverage_scoring.py tests/test_coverage_engine.py
          tests/test_coverage_api.py tests/test_coverage_perf.py
      - name: Pytest (capacity policy regression)
        run: pytest -vv tests/test_capacity.py tests/test_capacity_api.py tests/performance/test_capacity_model.py
      # SIEM/SOAR export: SSRF security tests, adapter contract, outbox/delivery concurrency, and
      # mock-transport delivery — no real SIEM tenant is contacted in CI.
      - name: Pytest (SIEM export SSRF + adapters + outbox/delivery concurrency)
        run: >-
          pytest -vv tests/test_integrations_core.py tests/test_integrations_delivery.py
          tests/test_integrations_api.py tests/test_integrations_retention.py
      # Reliability / disaster recovery: region fencing, restore verification, failover control
      # plane, and readiness — deterministic, no real cloud infrastructure contacted.
      - name: Pytest (reliability fencing + restore verify + failover)
        run: >-
          pytest -vv tests/test_reliability_domain.py tests/test_reliability_fencing.py
          tests/test_reliability_restore.py tests/test_reliability_api.py

  postgres-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: deceptiforge_ci
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci-test-only
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U ci -d deceptiforge_ci" --health-interval 5s
          --health-timeout 3s --health-retries 15
    defaults:
      run:
        working-directory: apps/api
    env:
      DATABASE_URL: postgresql+psycopg://ci:ci-test-only@localhost:5432/deceptiforge_ci
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install
        run: |
          pip install --require-hashes -r requirements-dev.lock.txt
          pip install --no-deps -e .
      - name: Diagnostics (safe)
        run: |
          echo "alembic: $(alembic --version)"
          echo "postgres reachable: $(pg_isready -h localhost -p 5432 >/dev/null 2>&1 && echo yes || echo no)"
      - name: Migrations — apply to live PostgreSQL
        run: alembic upgrade head
      - name: Migrations — current revision
        run: alembic current
      - name: Migrations — downgrade one and re-apply (rollback check)
        run: |
          alembic downgrade -1
          alembic upgrade head
      - name: Migrations — assert tables and alert-episode constraint exist
        env:
          PGPASSWORD: ci-test-only
        run: |
          for t in api_keys monitor_credentials security_audit reconstruction_jobs incidents alerts; do
            psql -h localhost -U ci -d deceptiforge_ci -tAc \
              "SELECT to_regclass('public.$t')" | grep -qx "$t" || { echo "missing table: $t"; exit 1; }
          done
          psql -h localhost -U ci -d deceptiforge_ci -tAc \
            "SELECT conname FROM pg_constraint WHERE conname='uq_alert_episode'" \
            | grep -qx uq_alert_episode || { echo "missing constraint: uq_alert_episode"; exit 1; }
      - name: Concurrent duplicate-ingestion tests (live PostgreSQL)
        env:
          POSTGRES_TEST_URL: postgresql+psycopg://ci:ci-test-only@localhost:5432/deceptiforge_ci
        run: pytest -vv tests/test_alert_concurrency.py
      - name: Database honey connector integration (live PostgreSQL, synthetic schema)
        env:
          POSTGRES_TEST_URL: postgresql+psycopg://ci:ci-test-only@localhost:5432/deceptiforge_ci
        run: pytest -vv tests/test_database_honey_integration.py

  redis-integration:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s
          --health-timeout 3s --health-retries 10
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install
        run: |
          pip install --require-hashes -r requirements-dev.lock.txt
          pip install --no-deps -e .
      - name: Distributed replay + rate-limit integration (real Redis)
        env:
          REDIS_TEST_URL: redis://localhost:6379/0
        run: pytest -vv -k redis_integration

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      # Enable Corepack BEFORE setup-node so its built-in pnpm cache finds the pnpm shim. pnpm
      # version comes from packageManager in package.json (single source of truth). This avoids a
      # separate actions/cache@v4 step, which still declares the deprecated Node 20 runtime.
      - name: Enable Corepack
        run: corepack enable
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm typecheck
      - name: Lint
        run: pnpm lint
      - name: Test
        run: pnpm test
      - name: Build (web dashboard + extension)
        run: pnpm build
      # Assert the headers on REAL responses from the production server. Reading next.config.ts only
      # proves intent; this proves the built application emits them. It still does not prove a
      # deployed ingress preserves them — that must be verified against the real edge.
      - name: Security headers present on production responses
        working-directory: apps/web
        run: |
          set -euo pipefail
          PORT=3100 pnpm start > /tmp/web-prod.log 2>&1 &
          for i in $(seq 1 30); do
            curl -sf -o /dev/null http://127.0.0.1:3100/ && break
            [ "$i" = "30" ] && { echo "web server never started"; cat /tmp/web-prod.log; exit 1; }
            sleep 2
          done
          headers="$(curl -sI http://127.0.0.1:3100/)"
          echo "$headers"
          for header in \
            'content-security-policy' \
            'x-content-type-options' \
            'x-frame-options' \
            'referrer-policy' \
            'permissions-policy' \
            'strict-transport-security'; do
            echo "$headers" | grep -qi "^$header:" || { echo "missing header: $header"; exit 1; }
          done
          csp="$(echo "$headers" | grep -i '^content-security-policy:')"
          echo "$csp" | grep -q "nonce-" || { echo "CSP is missing a per-request nonce"; exit 1; }
          echo "$csp" | grep -q "frame-ancestors 'none'" || { echo "CSP allows framing"; exit 1; }
          # A regression to 'unsafe-inline' scripts would silently undo the protection.
          script_src="$(echo "$csp" | grep -o "script-src[^;]*")"
          echo "$script_src" | grep -q "unsafe-inline" && { echo "script-src allows unsafe-inline"; exit 1; }
          # REGRESSION GUARD. A statically prerendered page is built once with no nonce, while the
          # middleware sends a fresh per-request nonce. Under 'strict-dynamic' a nonce is the only
          # thing that authorises a script, so a prerendered page has every script blocked and the
          # app never hydrates — with no console error and no failing header assertion. The only
          # reliable signal is that the nonce in the HTML matches the nonce in the header.
          page="$(curl -s -D /tmp/hdr.txt http://127.0.0.1:3100/)"
          header_nonce="$(grep -io "nonce-[a-f0-9]\{32\}" /tmp/hdr.txt | head -1 | sed 's/^nonce-//I')"
          html_nonce="$(printf '%s' "$page" | grep -o 'nonce="[a-f0-9]\{32\}"' | head -1 | sed 's/nonce="//; s/"//')"
          if [ -z "$html_nonce" ]; then
            echo "no nonce in the served HTML: scripts would be blocked and the app would not hydrate"
            exit 1
          fi
          if [ "$header_nonce" != "$html_nonce" ]; then
            echo "nonce mismatch: header=$header_nonce html=$html_nonce"
            echo "the page is probably statically prerendered; scripts will be blocked at runtime"
            exit 1
          fi
          echo "security headers verified on live responses (nonce matches the served HTML)"
      # Extension hardening: the built MV3 bundle must request only minimal permissions, ship a
      # locked-down CSP, and contain no eval, no remote code, and no embedded secrets.
      - name: Extension manifest + permission audit
        run: |
          set -euo pipefail
          MF=apps/extension/build/chrome-mv3-prod/manifest.json
          test -f "$MF" || { echo "missing built manifest"; exit 1; }
          for forbidden in '<all_urls>' 'clipboardRead' 'webRequest' '"history"' '"tabs"' '"cookies"' '"<all_urls>"'; do
            if grep -q "$forbidden" "$MF"; then echo "forbidden permission: $forbidden"; exit 1; fi
          done
          grep -q '"storage"' "$MF" || { echo "expected minimal storage permission"; exit 1; }
          echo "manifest permission audit passed"
      - name: Extension no-eval / no-remote-code / secret scan
        run: |
          set -euo pipefail
          DIR=apps/extension/build/chrome-mv3-prod
          if grep -rEn 'eval\(|new Function\(' "$DIR"/*.js "$DIR"/**/*.js 2>/dev/null; then
            echo "eval / new Function found in extension build"; exit 1; fi
          if grep -rEn "https?://[^\"' )]+\.js" "$DIR"/*.js "$DIR"/**/*.js 2>/dev/null; then
            echo "remote script URL found in extension build"; exit 1; fi
          if grep -rEn 'dfk_[A-Za-z0-9]{8}|signing_secret"?\s*[:=]\s*"[A-Za-z0-9_-]{16}|BEGIN (RSA|EC|PRIVATE) KEY' "$DIR" 2>/dev/null; then
            echo "possible secret embedded in extension build"; exit 1; fi
          echo "no eval / remote code / secrets in extension build"

  production-config:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install
        run: |
          pip install --require-hashes -r requirements-dev.lock.txt
          pip install --no-deps -e .
      - name: Production settings smoke test
        run: pytest -vv tests/test_production_settings_smoke.py
      - name: Production Compose renders
        working-directory: .
        env:
          POSTGRES_DB: deceptiforge
          POSTGRES_USER: deceptiforge
          POSTGRES_PASSWORD: ci-test-only
          EVIDENCE_ENCRYPTION_KEY: ci-test-only
        run: docker compose -f docker-compose.prod.example.yml config > /dev/null
        # Exact topology values (signatures on, demo off, private ports, worker services) are
        # asserted against the file in tests/test_production_settings_smoke.py above.

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - name: Build API image
        run: docker build -t deceptiforge-api -f apps/api/Dockerfile .
      - name: Assert base image is pinned by digest
        run: |
          set -euo pipefail
          grep -qE '^FROM .+@sha256:[0-9a-f]{64}' apps/api/Dockerfile \
            || { echo 'API base image must be pinned by digest'; exit 1; }
          echo 'base image digest pin ok'
      # Container vulnerability scan. CRITICAL/HIGH block the build; lower severities are reported
      # but do not fail, so a scanner finding is never silently discarded.
      - name: Scan API image (Trivy)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: deceptiforge-api
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'
          trivyignores: .trivyignore
      - name: Assert container runs as UID 10001 (non-root)
        run: |
          uid="$(docker run --rm deceptiforge-api id -u)"
          echo "container uid=$uid"
          test "$uid" = "10001"
      - name: Assert default command does not run migrations
        run: |
          cmd="$(docker inspect --format '{{json .Config.Cmd}}' deceptiforge-api)"
          echo "cmd=$cmd"
          echo "$cmd" | grep -q uvicorn
          echo "$cmd" | grep -qiv alembic
      - name: Runtime-only import smoke (no dev dependencies)
        # The image installs only runtime deps. Importing the full router graph here catches a
        # runtime dependency (e.g. httpx) that was only declared under [dev] — before the app
        # crashes on boot with no listener.
        # APP_ENV=development so create_app() skips prod runtime validation (redis/rate-limit/etc);
        # this step verifies the import graph resolves, not the production config surface.
        run: |
          docker run --rm -e APP_ENV=development \
            -e DATABASE_URL='postgresql+psycopg://u:p@localhost/db' \
            deceptiforge-api python -c 'import app.main; print("import ok")'
      - name: Start container (development, no external deps required for probes)
        run: |
          set -euo pipefail
          docker run -d --name df-api \
            -e APP_ENV=development \
            -e DATABASE_URL='postgresql+psycopg://u:p@localhost/db' \
            -p 8000:8000 deceptiforge-api
          healthy=false
          for i in $(seq 1 30); do
            # Fail fast if the container exited (e.g. an import error) instead of waiting the full 30s.
            if [ "$(docker inspect -f '{{.State.Running}}' df-api)" != "true" ]; then
              echo "container is not running (exited during startup):"
              docker logs df-api || true
              exit 1
            fi
            if curl -fsS http://localhost:8000/health >/dev/null; then healthy=true; break; fi
            sleep 1
          done
          if [ "$healthy" != "true" ]; then
            echo "container never became healthy; last logs:"
            docker logs df-api || true
            exit 1
          fi
      - name: Health endpoint responds
        run: curl -fsS http://localhost:8000/health
      - name: Readiness endpoint responds safely (no secrets)
        run: |
          body="$(curl -s http://localhost:8000/ready)"
          echo "$body"
          # Reports dependency + enforcement state (monitor_signatures_enforced is a safe boolean).
          echo "$body" | grep -q '"database"'
          echo "$body" | grep -q 'monitor_signatures_enforced'
          # Must not leak secret material.
          echo "$body" | grep -Eqi 'password|signing_secret|api[_-]?key' && \
            { echo "readiness leaked secret material"; exit 1; } || true
      - name: Demo routes unavailable in this image config
        run: |
          code="$(curl -s -o /dev/null -w '%{http_code}' -X POST http://localhost:8000/demo/seed)"
          echo "demo seed status=$code"
          test "$code" = "404"
      - name: Stop container
        if: always()
        run: docker rm -f df-api || true

  supply-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Enable Corepack
        run: corepack enable
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install tooling
        run: pip install --upgrade pip pip-audit cyclonedx-bom
      # Tier 1 (blocking): the dependency set that actually ships in the production image. The image
      # installs runtime deps only, so this is the set an attacker can reach at runtime.
      - name: Runtime dependency audit (blocking)
        run: |
          set -euo pipefail
          python -m venv /tmp/rtaudit
          /tmp/rtaudit/bin/pip install --upgrade pip >/dev/null
          /tmp/rtaudit/bin/pip install --require-hashes -r apps/api/requirements.lock.txt >/dev/null
          /tmp/rtaudit/bin/pip install pip-audit >/dev/null
          ignores=""
          if [ -f .pip-audit-ignore ]; then
            while read -r id; do
              case "$id" in ''|'#'*) continue ;; esac
              ignores="$ignores --ignore-vuln $id"
            done < .pip-audit-ignore
          fi
          # shellcheck disable=SC2086
          /tmp/rtaudit/bin/pip-audit --skip-editable --progress-spinner off $ignores
      - name: Install API dependencies (dev group)
        working-directory: apps/api
        run: |
          pip install --require-hashes -r requirements-dev.lock.txt
          pip install --no-deps -e .
      # Tier 2 (reported, non-blocking): developer tooling never reaches the production image, so a
      # finding here is surfaced in the log rather than blocking a release. It is never hidden.
      - name: Development dependency audit (reported)
        continue-on-error: true
        working-directory: apps/api
        run: pip-audit --skip-editable --progress-spinner off
      - name: Install web dependencies
        run: pnpm install --frozen-lockfile
      # Tier 1 (blocking): production JavaScript dependencies. The lockfile is authoritative.
      - name: JavaScript dependency audit (blocking, production)
        run: pnpm audit --audit-level high --prod
      # Tier 2 (reported): build toolchain findings are surfaced but do not block a release, since
      # they are not present in any shipped artifact.
      - name: JavaScript dependency audit (reported, all groups)
        continue-on-error: true
        run: pnpm audit --audit-level moderate
      - name: Generate SBOMs (CycloneDX)
        run: |
          set -euo pipefail
          mkdir -p sbom
          cyclonedx-py environment --of JSON -o sbom/api-dependencies.cdx.json
          pnpm dlx @cyclonedx/cyclonedx-npm@6.0.0 --output-format JSON \
            --output-file sbom/web-dependencies.cdx.json ||
            echo 'web SBOM generation unavailable; API SBOM still produced'
      # Every SBOM is tied to the exact revision it describes.
      - name: Stamp SBOMs with the build revision
        run: |
          set -euo pipefail
          python -c "
          import glob, json, os
          for path in glob.glob('sbom/*.cdx.json'):
              with open(path) as handle:
                  doc = json.load(handle)
              doc.setdefault('metadata', {}).setdefault('properties', []).append(
                  {'name': 'deceptiforge:build-revision', 'value': os.environ['GITHUB_SHA']}
              )
              with open(path, 'w') as handle:
                  json.dump(doc, handle, indent=2)
              print('stamped', path)
          "
      # An SBOM lists package metadata only; assert no credential material leaked into it.
      - name: Assert SBOMs contain no secret material
        run: |
          set -euo pipefail
          if grep -rniE 'BEGIN (RSA|OPENSSH|EC) PRIVATE KEY|dfk_[A-Za-z0-9_-]{16,}|AWS_SECRET_ACCESS_KEY' sbom/; then
            echo 'secret-like material found in SBOM'; exit 1
          fi
          echo 'SBOM secret check passed'
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sbom-${{ github.sha }}
          path: sbom/
          retention-days: 30

  # Boots the ACTUAL production-shaped topology. `docker compose config` only proves the YAML
  # renders; this proves the stack starts, migrates, serves, and carries one real signed event all
  # the way to an alert and an incident.
  production-topology:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - name: Compose environment (CI-only values; no production secret is used)
        run: |
          set -euo pipefail
          cat > .env <<'ENVEOF'
          POSTGRES_DB=deceptiforge_ci
          POSTGRES_USER=ci
          POSTGRES_PASSWORD=ci-test-only
          EVIDENCE_ENCRYPTION_KEY=ci-evidence-key-0000000000000000000000
          ENVEOF
      - name: Build images
        run: docker compose -p deceptiforge-ci -f docker-compose.prod.example.yml -f docker-compose.ci.yml build
      - name: Start data services and wait for health
        run: |
          set -euo pipefail
          docker compose -p deceptiforge-ci -f docker-compose.prod.example.yml -f docker-compose.ci.yml up -d postgres redis
          for service in postgres redis; do
            for i in $(seq 1 40); do
              cid="$(docker compose -p deceptiforge-ci -f docker-compose.prod.example.yml -f docker-compose.ci.yml ps -q "$service")"
              state="$(docker inspect --format '{{.State.Health.Status}}' "$cid" 2>/dev/null || echo starting)"
              [ "$state" = "healthy" ] && { echo "$service healthy"; break; }
              [ "$i" = "40" ] && { echo "$service never became healthy"; exit 1; }
              sleep 3
            done
          done
      # Migrations are a separate release step, never run at container startup.
      - name: Run migrations as a release step
        run: |
          set -euo pipefail
          docker compose -p deceptiforge-ci -f docker-compose.prod.example.yml -f docker-compose.ci.yml \
            run --rm --entrypoint alembic api upgrade head
      - name: Start API and workers
        run: |
          set -euo pipefail
          docker compose -p deceptiforge-ci -f docker-compose.prod.example.yml -f docker-compose.ci.yml up -d
      - name: API becomes live and ready
        run: |
          set -euo pipefail
          for i in $(seq 1 40); do
            code="$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8000/health || true)"
            [ "$code" = "200" ] && { echo "health ok"; break; }
            [ "$i" = "40" ] && { echo "API never became live"; exit 1; }
            sleep 3
          done
          for i in $(seq 1 20); do
            code="$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8000/ready || true)"
            [ "$code" = "200" ] && { echo "ready ok"; break; }
            [ "$i" = "20" ] && { curl -s http://127.0.0.1:8000/ready; echo; exit 1; }
            sleep 3
          done
          curl -sf http://127.0.0.1:8000/ready | grep -q '"database"' || exit 1
      - name: Mandatory workers ran successfully
        run: |
          set -euo pipefail
          for worker in reconstruction-worker lifecycle-cron retention-cron; do
            cid="$(docker compose -p deceptiforge-ci -f docker-compose.prod.example.yml -f docker-compose.ci.yml ps -aq "$worker")"
            [ -n "$cid" ] || { echo "$worker did not start"; exit 1; }
            for i in $(seq 1 20); do
              running="$(docker inspect --format '{{.State.Running}}' "$cid")"
              [ "$running" = "false" ] && break
              sleep 3
            done
            code="$(docker inspect --format '{{.State.ExitCode}}' "$cid")"
            [ "$code" = "0" ] || { echo "$worker exited $code"; docker logs "$cid"; exit 1; }
            echo "$worker completed cleanly"
          done
      # One real signed event must reach an alert and an incident through the production topology.
      - name: Seed a tenant and drive one signed event to an alert
        run: |
          set -euo pipefail
          docker compose -p deceptiforge-ci -f docker-compose.prod.example.yml -f docker-compose.ci.yml \
            run --rm --entrypoint python -e PYTHONPATH=/app \
            -v "$PWD/scripts:/scripts:ro" api /scripts/ci/seed_topology.py > seed.env
          set -a; . ./seed.env; set +a
          BASE_URL=http://127.0.0.1:8000 bash scripts/staging/smoke_test.sh
      - name: Reconstruction produces an incident
        run: |
          set -euo pipefail
          set -a; . ./seed.env; set +a
          docker compose -p deceptiforge-ci -f docker-compose.prod.example.yml -f docker-compose.ci.yml \
            run --rm --entrypoint python api -m app.jobs.reconstruction
          incidents="$(curl -sf http://127.0.0.1:8000/incidents \
            -H "X-DeceptiForge-API-Key: $READ_API_KEY" -H "X-DeceptiForge-Org-Id: $ORG_ID" || echo '{}')"
          echo "$incidents" | python3 -c "import json,sys; d=json.load(sys.stdin); n=len(d.get('incidents', [])); print('incidents:', n); sys.exit(0 if n >= 1 else 1)"
      - name: Compose logs on failure
        if: failure()
        run: docker compose -p deceptiforge-ci -f docker-compose.prod.example.yml -f docker-compose.ci.yml logs --tail 200
      - name: Tear down
        if: always()
        run: |
          # `down` still interpolates the compose file, so .env must survive until after it runs.
          docker compose -p deceptiforge-ci -f docker-compose.prod.example.yml -f docker-compose.ci.yml down -v || true
          rm -f seed.env .env

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0
      - name: Gitleaks (pinned version, verified against published checksums, redacted)
        run: |
          tar="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          base="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"
          curl -sSfL "$base/$tar" -o "$tar"
          curl -sSfL "$base/gitleaks_${GITLEAKS_VERSION}_checksums.txt" -o checksums.txt
          # Verify the exact pinned artifact against the release's published checksum.
          grep " $tar\$" checksums.txt | sha256sum -c -
          tar -xzf "$tar" gitleaks
          ./gitleaks detect --source . --config .gitleaks.toml --redact --no-banner --exit-code 1

  reliability-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - name: Reliability scripts syntax + safety
        run: |
          set -euo pipefail
          # 1. Every reliability script must parse.
          for f in scripts/reliability/*.sh; do bash -n "$f"; done
          # 2. Scripts must be env-guarded (strict mode) and must not echo secret-looking literals.
          for f in scripts/reliability/*.sh; do
            grep -q 'set -euo pipefail' "$f" || { echo "$f missing strict mode"; exit 1; }
          done
          if grep -rnE '(SECRET|TOKEN|PASSWORD|API_KEY)[A-Z_]*=[A-Za-z0-9/+_-]{12,}' scripts/reliability/; then
            echo "reliability script contains an embedded secret-looking literal"; exit 1; fi
          # 3. Runbook links referenced by SecurityIntegrations/DisasterRecovery must exist.
          for doc in ReliabilityArchitecture BackupPolicy PostgreSQLRecovery DisasterRecovery \
                     RegionalFailover RegionalFailback RestoreDrills DegradedModes EncryptionKeyRecovery; do
            test -f "docs/$doc.md" || { echo "missing docs/$doc.md"; exit 1; }
          done
          for rb in RegionalOutage DatabaseCorruption RedisFailure ObjectStorageFailure; do
            test -f "docs/runbooks/$rb.md" || { echo "missing docs/runbooks/$rb.md"; exit 1; }
          done
          echo "reliability scripts + docs check passed"
